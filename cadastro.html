<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bytes - Cadastro</title>
</head>

<body>
    <div class="tela">
        <div class="logo">
            <img src="imagens/logo_pag03 png.png" class="logo">
        </div><!--logo-->

        <div class="campo">
            <p style="color: #944438;">Nome e Sobrenome:</p>
            <input type="text" id="inpt_nome" placeholder="Insira seu nome completo"> <br><br>
        </div><!--campo-->

        <div class="campo">
            <p style="color: #944438;">Email:</p>
            <input type="text" id="inpt_email" placeholder="Insira seu email"> <br><br>
        </div><!--campo-->

        <div class="campo">
           <p style="color: #944438;"> Data de Nascimento:</p>
            <input type="text" id="inpt_dtNasc" placeholder="dd/mm/aaaa"><br><br>
        </div><!--campo-->

        <div class="campo">
            <p style="color: #944438;">Senha:</p>
            <input type="text" id="inpt_senha" placeholder="Crie uma senha"><br><br>
        </div><!--campo-->

        <div class="botao">
            <button>Cadastre-se</button><br>
        </div><!--botao-->

        <div class="jaPossui">
            <p>Já tem conta? <a href="#">Logar-se</a></p>
        </div><!--jaPossui-->
    </div><!--tela-->
</body>

</html>
