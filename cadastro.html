<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bytes - Cadastro</title>
    <link rel="stylesheet" href="assets/css/cadastro.css">
</head>

<body>
    <div class="container">

        <div class="logo">
            <img src="assets/imagens/logo_pag03 png.png" alt="">
        </div>

        <div class="form">
            <form action="">
                <div class="inputs">
                    <div class="campo">
                        <label for="inpt_nome">Nome e sobrenome:</label>
                        <input type="text" id="inpt_nome" placeholder="Insira seu nome completo">
                    </div><!--campo-->

                    <div class="campo">
                        <label for="inpt_email">Email</label>
                        <input type="text" id="inpt_email" placeholder="Insira seu email">
                    </div><!--campo-->

                    <div class="campo">
                        <label for="inpt_dtNasc">Data de Nascimento:</label>
                        <input type="text" id="inpt_dtNasc" placeholder="dd/mm/aaaa">
                    </div><!--campo-->

                    <div class="campo">
                        <label for="inpt_senha">Senha:</label>
                        <input type="password" id="inpt_senha" placeholder="Crie uma senha">
                    </div><!--campo-->
                </div><!--inputs-->

                <div class="botao">
                    <div class="cadastro">
                        <button><a href="#">Cadastre-se</a></button>
                    </div><!--cadastro-->
                </div><!--botao-->

                <div class="jaPossui">
                    <p>Já possui conta?<a href="login.html"> Logar-se</a></p>
                </div>
            </form>
        </div><!--form-->

    </div><!--container-->

</body>

</html>
