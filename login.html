<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bytes - Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <div class="container">

        <div class="voltar">
            <a href="index.html">
                <img src="assets/imagens/img-seta.png" alt="">
            </a>
            <p>
                <a href="index.html">Voltar</a>
            </p>
        </div>

        <div class="logo">
            <img src="assets/imagens/logo_pag03 png.png" alt="">
        </div>

        <div class="form">
            <form action="">
                <div class="inputs">
                    <div class="campo">
                        <label for="inpt_email">Email</label>
                        <input type="text" id="inpt_email" placeholder="Insira seu email">
                    </div><!--campo-->

                    <div class="campo">
                        <label for="inpt_senha">Senha:</label>
                        <input type="password" id="inpt_senha" placeholder="Crie uma senha">
                    </div><!--campo-->
                </div><!--inputs-->

                <div class="botao">
                        <a href="#" class="login">Entre</a>
                </div><!--botao-->

                <div class="naoPossui">
                    <p>Ainda não possui conta?<a href="cadastro.html"> Cadastre-se</a></p>
                </div>
            </form>
        </div><!--form-->

    </div><!--container-->

</body>

</html>
